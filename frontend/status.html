<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Claim Status — Aegis Protocol</title>
  <link rel="stylesheet" href="aegis-theme.css">
  <style>
    .status-layout {
      max-width: 760px; margin: 0 auto; padding: 48px 48px 80px;
    }
    .status-input-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 28px; margin-bottom: 28px;
    }
    .status-row { display: flex; gap: 10px; flex-wrap: wrap; }
    #claimIdInput {
      flex: 1; min-width: 200px;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text);
      font-family: 'Space Grotesk', sans-serif; font-size: .92rem;
      padding: 11px 16px; outline: none; transition: border-color .18s;
    }
    #claimIdInput:focus { border-color: var(--accent); }
    #checkBtn {
      padding: 11px 24px; background: var(--accent); color: #fff;
      border: none; border-radius: 10px; font-weight: 700; font-size: .88rem;
      cursor: none; font-family: 'Space Grotesk', sans-serif; transition: background .15s;
    }
    #checkBtn:hover { background: #2563eb; }
    #checkBtn:disabled { opacity: .6; }

    /* Result card */
    .result-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 28px;
    }

    /* Verdict badge */
    .verdict-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
    .v-badge {
      padding: 5px 16px; border-radius: 100px;
      font-size: .78rem; font-weight: 800; letter-spacing: .06em;
      text-transform: uppercase; font-family: 'JetBrains Mono', monospace;
    }
    .v-true     { background: rgba(16,185,129,.12); color: #34d399; border: 1px solid rgba(16,185,129,.25); }
    .v-false    { background: rgba(239,68,68,.12);  color: #f87171; border: 1px solid rgba(239,68,68,.25); }
    .v-mislead  { background: rgba(245,158,11,.12); color: #fbbf24; border: 1px solid rgba(245,158,11,.25); }
    .v-pending  { background: rgba(99,102,241,.12); color: #a5b4fc; border: 1px solid rgba(99,102,241,.25); }
    .v-status   { background: rgba(59,130,246,.12); color: #60a5fa; border: 1px solid rgba(59,130,246,.25); }

    /* Claim text box */
    .claim-text-box {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 12px; padding: 16px 20px;
      font-size: .92rem; line-height: 1.7; margin-bottom: 20px;
      color: var(--text);
    }

    /* Confidence bar */
    .conf-row { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .conf-bar { flex: 1; height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
    .conf-fill { height: 100%; border-radius: 3px; background: var(--accent); transition: width .6s ease; }
    .conf-label { font-size: .8rem; font-weight: 700; font-family: 'JetBrains Mono', monospace; color: var(--accent); min-width: 40px; text-align: right; }

    /* Timeline */
    .timeline { display: flex; flex-direction: column; gap: 0; margin: 20px 0; }
    .tl-item { display: flex; gap: 14px; padding: 14px 0; border-bottom: 1px solid var(--border); }
    .tl-item:last-child { border-bottom: none; }
    .tl-dot {
      width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: .7rem; font-weight: 700; margin-top: 2px;
    }
    .tl-dot.done  { background: rgba(16,185,129,.15); color: var(--green); border: 1px solid rgba(16,185,129,.3); }
    .tl-dot.active{ background: rgba(59,130,246,.15); color: var(--accent); border: 1px solid rgba(59,130,246,.3); animation: pulse 1.5s ease-in-out infinite; }
    .tl-dot.wait  { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .tl-title { font-size: .88rem; font-weight: 700; margin-bottom: 3px; }
    .tl-desc  { font-size: .8rem; color: var(--muted); line-height: 1.5; }
    .tl-time  { font-size: .72rem; color: var(--muted); font-family: 'JetBrains Mono', monospace; margin-top: 3px; }

    /* Evidence items */
    .evidence-list { display: flex; flex-direction: column; gap: 10px; margin-top: 12px; }
    .ev-item {
      background: var(--bg2); border: 1px solid var(--border);
      border-left: 3px solid var(--accent); border-radius: 10px; padding: 14px 16px;
    }
    .ev-text { font-size: .86rem; line-height: 1.6; margin-bottom: 6px; }
    .ev-source { font-size: .76rem; color: var(--muted); font-family: 'JetBrains Mono', monospace; }

    /* Reasoning */
    .reasoning-box {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 12px; padding: 18px 20px;
      font-size: .88rem; line-height: 1.75; color: var(--muted);
      margin-top: 12px;
    }

    /* Error / info banners */
    .info-banner {
      padding: 12px 18px; border-radius: 10px; font-size: .84rem;
      font-family: 'JetBrains Mono', monospace;
    }
    .info-banner.warn { background: rgba(245,158,11,.08); border: 1px solid rgba(245,158,11,.2); color: #fbbf24; }
    .info-banner.err  { background: rgba(239,68,68,.08);  border: 1px solid rgba(239,68,68,.2);  color: #f87171; }
    .info-banner.ok   { background: rgba(16,185,129,.08); border: 1px solid rgba(16,185,129,.2); color: #34d399; }

    @media(max-width:640px){ .status-layout { padding: 28px 20px 60px; } }
  </style>
</head>
<body>
  <script>window.AEGIS_ACTIVE='status';</script>
  <script src="aegis-nav.js"></script>

  <div class="ae-page">
    <div class="ae-page-hero ae-reveal">
      <div class="ae-page-label">// CLAIM TRACKER</div>
      <h1>Check Claim Status</h1>
      <p>Enter a claim ID to view its verification status, verdict, and full evidence report.</p>
    </div>

    <div class="status-layout">
      <!-- Input -->
      <div class="status-input-card ae-reveal">
        <div class="ae-label mb-12">// CLAIM ID LOOKUP</div>
        <div class="status-row">
          <input type="text" id="claimIdInput" placeholder="Enter claim ID (e.g. 9c8c267e-0c08-46d9-ba6a-04cabd4313f2)">
          <button id="checkBtn" onclick="checkStatus()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="display:inline;margin-right:6px;"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            Check Status
          </button>
        </div>
      </div>

      <!-- Result area -->
      <div id="resultArea"></div>
    </div>

    <footer class="ae-footer">
      <span>Aegis Protocol &copy; 2025</span>
      <span style="color:var(--accent);font-size:.7rem;">SYSTEM ONLINE // AGENTS ACTIVE</span>
      <span>Built with multi-agent AI</span>
    </footer>
  </div>

  <script>
    const BACKEND = 'https://misinformation-1ouh.onrender.com';
    let autoRefreshTimer = null;

    // Auto-fill from URL param
    const urlParams = new URLSearchParams(window.location.search);
    const urlId = urlParams.get('id');
    if (urlId) {
      document.getElementById('claimIdInput').value = urlId;
      window.addEventListener('DOMContentLoaded', () => checkStatus());
    }

    document.getElementById('claimIdInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') checkStatus();
    });

    function verdictBadgeClass(v) {
      if (!v) return 'v-pending';
      const lv = v.toLowerCase();
      if (lv === 'true') return 'v-true';
      if (lv === 'false') return 'v-false';
      if (lv.includes('mislead')) return 'v-mislead';
      return 'v-pending';
    }

    function tlDotClass(state) {
      if (state === 'done') return 'done';
      if (state === 'active') return 'active';
      return 'wait';
    }

    function tlDotIcon(state) {
      if (state === 'done') return '&#10003;';
      if (state === 'active') return '&#9679;';
      return '';
    }

    function renderResult(data) {
      const area = document.getElementById('resultArea');
      const isCompleted = data.status === 'completed';
      const isPending = data.status === 'pending';

      // Timeline states
      const s1 = data.created_at ? 'done' : 'active';
      const s2 = data.normalized_text ? 'done' : (isPending ? 'active' : 'wait');
      const s3 = (data.evidence && data.evidence.length > 0) ? 'done' : (isPending ? 'active' : 'wait');
      const s4 = data.verdict ? 'done' : (isPending ? 'active' : 'wait');
      const s5 = isCompleted ? 'done' : (isPending ? 'active' : 'wait');

      const confPct = data.confidence != null ? Math.round(data.confidence * 100) : null;

      let html = `<div class="result-card ae-reveal visible">`;

      // Header row
      html += `<div class="verdict-row">
        <span class="v-badge v-status">${data.status.toUpperCase()}</span>
        ${data.verdict ? `<span class="v-badge ${verdictBadgeClass(data.verdict)}">${data.verdict.toUpperCase()}</span>` : ''}
        ${data.severity ? `<span class="v-badge" style="background:rgba(245,158,11,.1);color:#fbbf24;border:1px solid rgba(245,158,11,.2);">${data.severity.toUpperCase()}</span>` : ''}
      </div>`;

      // Claim text
      if (data.claim_text || data.normalized_text) {
        html += `<div class="ae-label mb-8">// CLAIM</div>
          <div class="claim-text-box">${data.claim_text || data.normalized_text}</div>`;
      }

      // Confidence bar
      if (confPct != null) {
        const barColor = confPct >= 70 ? 'var(--green)' : confPct >= 40 ? '#fbbf24' : 'var(--danger)';
        html += `<div class="ae-label mb-8">// CONFIDENCE</div>
          <div class="conf-row">
            <div class="conf-bar"><div class="conf-fill" style="width:${confPct}%;background:${barColor};"></div></div>
            <span class="conf-label" style="color:${barColor};">${confPct}%</span>
          </div>`;
      }

      // Timeline
      html += `<div class="ae-label mb-8" style="margin-top:20px;">// PROCESSING TIMELINE</div>
        <div class="timeline">
          <div class="tl-item"><div class="tl-dot ${tlDotClass(s1)}">${tlDotIcon(s1)}</div><div><div class="tl-title">Claim Submitted</div><div class="tl-desc">Received and entered into the system</div>${data.created_at ? `<div class="tl-time">${new Date(data.created_at).toLocaleString()}</div>` : ''}</div></div>
          <div class="tl-item"><div class="tl-dot ${tlDotClass(s2)}">${tlDotIcon(s2)}</div><div><div class="tl-title">Normalization</div><div class="tl-desc">Text normalized, duplicates checked</div></div></div>
          <div class="tl-item"><div class="tl-dot ${tlDotClass(s3)}">${tlDotIcon(s3)}</div><div><div class="tl-title">Research Phase</div><div class="tl-desc">AI gathering supporting and refuting evidence</div></div></div>
          <div class="tl-item"><div class="tl-dot ${tlDotClass(s4)}">${tlDotIcon(s4)}</div><div><div class="tl-title">Investigation</div><div class="tl-desc">Evidence analyzed, verdict determined</div></div></div>
          <div class="tl-item"><div class="tl-dot ${tlDotClass(s5)}">${tlDotIcon(s5)}</div><div><div class="tl-title">Results Ready</div><div class="tl-desc">Full verification report available</div>${data.updated_at && isCompleted ? `<div class="tl-time">${new Date(data.updated_at).toLocaleString()}</div>` : ''}</div></div>
        </div>`;

      // Reasoning
      if (data.reasoning) {
        html += `<div class="ae-label mb-8" style="margin-top:20px;">// REASONING</div>
          <div class="reasoning-box">${data.reasoning}</div>`;
      }

      // Evidence
      if (data.evidence && data.evidence.length > 0) {
        html += `<div class="ae-label mb-8" style="margin-top:20px;">// EVIDENCE (${data.evidence.length} items)</div>
          <div class="evidence-list">`;
        data.evidence.forEach((ev, i) => {
          html += `<div class="ev-item">
            <div class="ev-text">${ev.summary || ev.text || 'Evidence item ' + (i + 1)}</div>
            ${ev.source ? `<div class="ev-source">Source: ${ev.source}</div>` : ''}
            ${ev.url ? `<div style="margin-top:6px;"><a href="${ev.url}" target="_blank" rel="noopener" style="color:var(--accent);font-size:.78rem;font-weight:600;">View Source &rarr;</a></div>` : ''}
          </div>`;
        });
        html += `</div>`;
      }

      // Auto-refresh notice for pending
      if (isPending) {
        html += `<div class="info-banner warn" style="margin-top:20px;">
          Claim is still being processed &mdash; auto-refreshing in 5 seconds...
        </div>`;
        clearTimeout(autoRefreshTimer);
        autoRefreshTimer = setTimeout(() => checkStatus(true), 5000);
      }

      html += `</div>`;
      area.innerHTML = html;
    }

    async function checkStatus(silent = false) {
      const id = document.getElementById('claimIdInput').value.trim();
      if (!id) return;

      const btn = document.getElementById('checkBtn');
      const area = document.getElementById('resultArea');

      if (!silent) {
        btn.textContent = 'Checking...'; btn.disabled = true;
        area.innerHTML = `<div class="info-banner warn">Loading claim status...</div>`;
      }

      try {
        const res = await fetch(`${BACKEND}/api/claims/${encodeURIComponent(id)}`, {
          signal: AbortSignal.timeout(10000)
        });
        if (!res.ok) throw new Error(`Claim not found (HTTP ${res.status})`);
        const data = await res.json();
        renderResult(data);
      } catch (err) {
        area.innerHTML = `<div class="info-banner err">
          ${err.message.includes('not found') ? 'Claim not found. Check the ID and try again.' : 'Backend is waking up or claim not found. Try again in 30 seconds. (' + err.message + ')'}
        </div>`;
      } finally {
        btn.textContent = 'Check Status'; btn.disabled = false;
      }
    }
  </script>
</body>
</html>
